<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6366F1" />
  <title>Dashboard — Calendar · To-Do · Calculator · Translator · Clock</title>
  <meta name="description" content="A modern productivity dashboard with calendar, to-do, calculator, translator, and clock — all in one place." />

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <!-- Styles (load order: tokens → base → components → shell → app) -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/shell.css" />
  <link rel="stylesheet" href="css/apps/calendar.css" />
  <link rel="stylesheet" href="css/apps/calculator.css" />
  <link rel="stylesheet" href="css/apps/todo.css" />
  <link rel="stylesheet" href="css/apps/translator.css" />
  <link rel="stylesheet" href="css/apps/clock.css" />
</head>

<body>
  <div class="app" id="app">
    <!-- Sidebar (desktop) -->
    <aside class="app-sidebar" id="sidebar" aria-label="Primary navigation"></aside>

    <!-- Top header -->
    <header class="app-header" id="topbar">
      <div class="app-header__title" id="page-title">Dashboard</div>

      <div class="app-header__search" id="search-slot">
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"/>
            <path d="m20 20-3.5-3.5"/>
          </svg>
          <input class="input" type="search" id="global-search"
                 placeholder="Search reminders, tasks, holidays…" aria-label="Search" />
        </div>
      </div>

      <div class="app-header__actions">
        <div class="clock-badge" id="ist-clock" data-tooltip="India Standard Time">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7v5l3 2"/>
          </svg>
          <span class="clock-badge__time" id="ist-clock-time">--:--:--</span>
          <span class="clock-badge__zone">IST</span>
        </div>

        <button class="icon-btn" id="btn-recycle-bin" data-tooltip="Recycle Bin" aria-label="Recycle Bin">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 6h18"/>
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
          </svg>
        </button>

        <button class="icon-btn" id="btn-shortcuts" data-tooltip="Keyboard shortcuts (?)" aria-label="Keyboard shortcuts">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="6" width="20" height="12" rx="2"/>
            <path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/>
          </svg>
        </button>

        <button class="icon-btn" id="btn-theme" data-tooltip="Toggle theme (Ctrl+/)" aria-label="Toggle theme">
          <svg class="icon" id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
          <svg class="icon" id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- View container -->
    <main class="app-view" id="view" tabindex="-1"></main>

    <!-- Bottom nav (mobile) -->
    <nav class="app-bottom-nav" id="bottom-nav" aria-label="Mobile navigation"></nav>
  </div>

  <!-- Modal + toast mount points -->
  <div id="modal-root"></div>
  <div class="toast-stack" id="toast-root" aria-live="polite" aria-atomic="true"></div>

  <!-- Bootstrap as ES module -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
